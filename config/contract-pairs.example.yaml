# Contract Pairs Configuration
# Each pair maps a Polymarket contract to its Kalshi equivalent.
# Operators manually curate this file — verify each pair before adding.
#
# Fields:
#   polymarketContractId      - Polymarket condition ID (hex hash, market-level identifier)
#   polymarketClobTokenId     - Polymarket CLOB token ID (large decimal, YES outcome token for CLOB operations)
#   kalshiContractId          - Kalshi ticker (required, e.g. KXEVENT-YYMM format)
#   eventDescription          - Human-readable event description (required, min 3 chars)
#   operatorVerificationTimestamp - ISO 8601 datetime when operator verified the match (required)
#   primaryLeg                - Which platform to execute first: "kalshi" (default) or "polymarket" (optional)
#
# Validation rules:
#   - Max 30 pairs
#   - No duplicate (polymarketContractId, kalshiContractId) combinations
#   - eventDescription must not match compliance-matrix.yaml blocked categories

pairs:
